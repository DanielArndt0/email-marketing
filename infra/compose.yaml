services:
  postgres:
    image: postgres:16
    container_name: email-marketing-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: email_marketing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - email_marketing_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: email-marketing-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - email_marketing_redis_data:/data

volumes:
  email_marketing_postgres_data:
  email_marketing_redis_data: