services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    image: email-marketing-postgres:local
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: email_marketing
      POSTGRES_USER: email_marketing
      POSTGRES_PASSWORD: email_marketing
    ports:
      - "5433:5432"
    volumes:
      - email_marketing_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - email_marketing_redisdata:/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  control-api:
    build:
      context: .
      dockerfile: Dockerfile.control-api
    container_name: control_api
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "3333:3333"
    depends_on:
      - postgres
      - redis
      - mailpit

  dispatch-worker:
    build:
      context: .
      dockerfile: Dockerfile.dispatch-worker
    container_name: dispatch_worker
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      - postgres
      - redis
      - mailpit

volumes:
  email_marketing_pgdata:
  email_marketing_redisdata:
